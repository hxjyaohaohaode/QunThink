<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>群想 · 想，就聊出来</title>

    <meta name="description" content="AI多角色群聊应用 — 想，就聊出来" />
    <meta name="theme-color" content="#6C5CE7" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="群想" />
    <meta name="application-name" content="群想" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-TileColor" content="#6C5CE7" />
    <meta name="msapplication-tap-highlight" content="no" />

    <link rel="apple-touch-icon" href="/pwa/apple-touch-icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/pwa/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/pwa/icon-192x192.png" />

    <script>
      (function() {
        try {
          var stored = localStorage.getItem('theme-storage');
          if (stored) {
            var parsed = JSON.parse(stored);
            var theme = parsed.state && parsed.state.theme;
            var effective = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (effective) {
              document.documentElement.classList.add('dark');
            }
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
