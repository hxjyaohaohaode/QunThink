services:
  - type: web
    name: ai-chat-group-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.18.0"
      - key: PORT
        value: 3002
      - key: AUTH_MODE
        value: session
      - key: DATA_DIR
        value: /opt/render/project/data
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GLM_API_KEY
        sync: false
      - key: MIMO_API_KEY
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: static
    name: ai-chat-group-frontend
    region: singapore
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_BACKEND_URL
        sync: false
      - key: VITE_AUTH_MODE
        value: session
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
